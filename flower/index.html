<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Your Garden">
    
    <link rel="apple-touch-icon" href="https://img.icons8.com/emoji/160/000000/bouquet-emoji.png">

    <title>A Sunset Garden For You</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Dancing+Script:wght@600&family=Quicksand:wght@400;600&display=swap');

        :root {
            --day-bg: #fff0f3;
            --sunset-2: #ffb5a7;
            --sunset-3: #f08080;
            --pink-soft: #ffcad4;
            --lily-petal: #fffcf2;
            --tulip-main: #ff758f;
            --leaf-dark: #52b788;
            --gold: #ffb703;
        }

        * {
            -webkit-tap-highlight-color: transparent;
            -webkit-user-select: none;
            user-select: none;
            box-sizing: border-box;
        }

        body {
            margin: 0;
            padding: 0;
            background: var(--day-bg);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100dvh;
            width: 100vw;
            font-family: 'Quicksand', sans-serif;
            overflow: hidden;
            transition: background 10s ease-in-out;
            position: fixed; /* Prevents iOS rubber-banding */
        }

        /* Blinking Animation */
        .eye { 
            fill: #444; 
            animation: blink 4s infinite; 
            transform-origin: center;
            transform-box: fill-box;
        }
        @keyframes blink { 
            0%, 90%, 100% { transform: scaleY(1); } 
            95% { transform: scaleY(0.1); } 
        }

        /* Interaction States */
        .blush { fill: #ffb7b2; opacity: 0; transition: opacity 0.3s ease; }
        .reacting .blush { opacity: 0.8; }
        .mouth-smile { display: block; }
        .mouth-open { display: none; fill: #444; }
        .reacting .mouth-smile { display: none; }
        .reacting .mouth-open { display: block; }

        @keyframes happyJump {
            0% { transform: scale(1); }
            30% { transform: scale(0.9) translateY(10px); }
            50% { transform: scale(1.05) translateY(-15px); }
            100% { transform: scale(1) translateY(0); }
        }
        .jump { animation: happyJump 0.5s ease-out; }

        #garden-bed { position: absolute; width: 100%; height: 100%; top: 0; left: 0; pointer-events: none; }
        .planted-flower { position: absolute; font-size: 24px; animation: grow 1.2s forwards; }
        @keyframes grow { 0% { transform: scale(0); opacity: 0; } 100% { transform: scale(1); opacity: 0.9; } }

        .canvas { 
            cursor: pointer; 
            z-index: 20; 
            width: 85%;
            max-width: 420px;
            display: flex;
            justify-content: center;
        }
        svg { width: 100%; height: auto; filter: drop-shadow(0 15px 30px rgba(0,0,0,0.1)); }

        .sway { animation: bouquetSway 6s infinite ease-in-out; transform-origin: bottom center; }
        @keyframes bouquetSway { 0%, 100% { transform: rotate(-1.5deg); } 50% { transform: rotate(1.5deg) translateX(5px); } }

        #text-overlay { 
            margin-top: 20px; 
            text-align: center; 
            height: 120px; 
            z-index: 30; 
            width: 90%;
            padding: 0 10px;
        }
        #subtitle { 
            font-family: 'Dancing Script', cursive; 
            font-size: 1.8rem; 
            color: #c9184a; 
            opacity: 0; 
            transition: 0.8s; 
            line-height: 1.2;
        }

        .visible { opacity: 1 !important; }

        .petal { position: absolute; background: var(--pink-soft); border-radius: 150% 0 150% 0; opacity: 0.6; animation: fall 6s linear forwards; }
        @keyframes fall { 0% { transform: translateY(-10vh); opacity: 0; } 100% { transform: translateY(110vh) rotate(360deg); opacity: 0; } }
    </style>
</head>
<body onclick="growFlower(event)">

    <div id="garden-bed"></div>

    <div class="canvas sway" id="bouquet" onclick="startExperience(event)">
        <svg viewBox="0 0 240 340" xmlns="http://www.w3.org/2000/svg">
            <defs>
                <radialGradient id="peonyGrad" cx="50%" cy="50%" r="50%">
                    <stop offset="0%" stop-color="#fff0f3" /><stop offset="100%" stop-color="#ffafcc" />
                </radialGradient>
            </defs>

            <g fill="var(--leaf-dark)" opacity="0.6">
                <path d="M120,220 Q10,150 20,80 Q70,70 120,220" />
                <path d="M120,220 Q230,150 220,80 Q170,70 120,220" />
                <path d="M120,180 Q120,20 80,30 Q140,20 120,180" />
            </g>
            <g stroke="var(--leaf-dark)" stroke-width="2.5" fill="none" stroke-linecap="round">
                <path d="M120,320 L40,140" /><path d="M120,320 L80,120" /><path d="M120,320 L120,100" /><path d="M120,320 L160,120" /><path d="M120,320 L200,140" />
            </g>

            <path d="M120,320 L10,160 Q120,80 230,160 Z" fill="white" opacity="0.4" />

            <g transform="translate(65, 135) rotate(-15) scale(0.8)">
                <path fill="var(--lily-petal)" d="M0,-25 C15,-20 25,10 0,30 C-25,10 -15,-20 0,-25" />
                <circle fill="#fee440" cx="0" cy="5" r="4"/>
                <circle class="blush" cx="-8" cy="8" r="4" /><circle class="blush" cx="8" cy="8" r="4" />
                <circle class="eye" cx="-3" cy="3" r="1.5"/><circle class="eye" cx="3" cy="3" r="1.5"/>
                <circle class="mouth-open" cx="0" cy="6" r="1.5" />
            </g>
            <g transform="translate(175, 120) rotate(10) scale(0.7)">
                <path fill="var(--lily-petal)" d="M0,-25 C15,-20 25,10 0,30 C-25,10 -15,-20 0,-25" />
                <circle fill="#fee440" cx="0" cy="5" r="4"/>
                <circle class="blush" cx="-8" cy="8" r="4" /><circle class="blush" cx="8" cy="8" r="4" />
                <circle class="eye" cx="-3" cy="3" r="1.5"/><circle class="eye" cx="3" cy="3" r="1.5"/>
                <circle class="mouth-open" cx="0" cy="6" r="1.2" />
            </g>
            <g transform="translate(185, 165) rotate(20) scale(0.85)">
                <path fill="var(--tulip-main)" d="M-15,-20 Q-15,15 0,15 Q15,15 15,-20 Q0,-10 -15,-20" />
                <circle class="blush" cx="-10" cy="0" r="4" /><circle class="blush" cx="10" cy="0" r="4" />
                <circle class="eye" cx="-5" cy="-2" r="1.8"/><circle class="eye" cx="5" cy="-2" r="1.8"/>
                <circle class="mouth-open" cx="0" cy="1" r="1.2" />
            </g>
            <g transform="translate(50, 165) rotate(-20) scale(0.85)">
                <path fill="var(--tulip-main)" d="M-15,-20 Q-15,15 0,15 Q15,15 15,-20 Q0,-10 -15,-20" />
                <circle class="blush" cx="-10" cy="0" r="4" /><circle class="blush" cx="10" cy="0" r="4" />
                <circle class="eye" cx="-5" cy="-2" r="1.8"/><circle class="eye" cx="5" cy="-2" r="1.8"/>
                <circle class="mouth-open" cx="0" cy="1" r="1.2" />
            </g>
            <g transform="translate(120, 105)">
                <circle fill="url(#peonyGrad)" cx="0" cy="0" r="40" />
                <path fill="#ffcad4" opacity="0.6" d="M-28,-18 Q-12,-38 12,-28 Q28,-12 18,12 Q0,28 -22,12 Z" />
                <circle class="blush" style="opacity: 0.5" cx="-14" cy="6" r="5" /><circle class="blush" style="opacity: 0.5" cx="14" cy="6" r="5" />
                <circle class="eye" cx="-8" cy="0" r="2.5" /><circle class="eye" cx="8" cy="0" r="2.5" />
                <path class="mouth-smile" d="M-4,10 Q0,14 4,10" stroke="#444" stroke-width="1.5" fill="none" stroke-linecap="round" />
                <circle class="mouth-open" cx="0" cy="11" r="2.5" />
            </g>

            <path d="M120,320 L50,220 Q120,185 190,220 Z" fill="white" opacity="0.3" />
            <circle fill="var(--gold)" cx="120" cy="265" r="7" />
            <path d="M120,265 Q100,250 95,275 M120,265 Q140,250 145,275" stroke="var(--gold)" stroke-width="4" fill="none" />
        </svg>
    </div>

    <div id="text-overlay"><div id="subtitle">Tap the bouquet...</div></div>

    <audio id="bg-music" loop><source src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3" type="audio/mpeg"></audio>

    <script>
        const audio = document.getElementById('bg-music');
        const subtitle = document.getElementById('subtitle');
        const bouquet = document.getElementById('bouquet');
        let started = false;

        const messages = [
            { t: 0, m: "The sun sets, but my love only grows..." },
            { t: 3, m: "For the girl who is my sunshine. ☀️" },
            { t: 7, m: "Every flower here is a thought of you." },
            { t: 11, m: "I love you to the moon and back! ❤️" }
        ];

        function growFlower(e) {
            if (e.target.closest('.canvas')) return;
            const flower = document.createElement('div');
            flower.className = 'planted-flower';
            const types = ['🌸', '🌷', '🌹', '💖', '✨', '🌼'];
            flower.innerText = types[Math.floor(Math.random() * types.length)];
            flower.style.left = e.clientX + 'px';
            flower.style.top = e.clientY + 'px';
            document.getElementById('garden-bed').appendChild(flower);
            setTimeout(() => flower.remove(), 3000);
        }

        function createPetal() {
            const p = document.createElement('div');
            p.className = 'petal';
            p.style.left = Math.random() * 100 + 'vw';
            p.style.width = p.style.height = Math.random() * 10 + 10 + 'px';
            document.body.appendChild(p);
            setTimeout(() => p.remove(), 6000);
        }

        function startExperience(e) {
            bouquet.classList.remove('jump', 'reacting');
            void bouquet.offsetWidth; 
            bouquet.classList.add('jump', 'reacting');

            setTimeout(() => bouquet.classList.remove('reacting'), 1500);

            if (started) return;
            started = true;
            audio.play();
            document.body.style.background = 'var(--sunset-2)';
            subtitle.classList.add('visible');
            setInterval(createPetal, 450);

            audio.ontimeupdate = () => {
                const current = messages.findLast(item => audio.currentTime >= item.t);
                if (current && subtitle.innerText !== current.m) {
                    subtitle.classList.remove('visible');
                    setTimeout(() => { 
                        subtitle.innerText = current.m; 
                        subtitle.classList.add('visible'); 
                    }, 400);
                }
                if(audio.currentTime > 8) document.body.style.background = 'var(--sunset-3)';
            };
        }
    </script>
</body>
</html>
